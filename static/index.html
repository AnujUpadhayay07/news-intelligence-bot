<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News Intelligence System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; justify-content: space-between; }
    .header-left h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .header-left p { font-size: 12px; color: #555; margin-top: 2px; }
    .badges { display: flex; gap: 6px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 100px; border: 1px solid #222; color: #666; }
    .clear-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #222; color: #666; background: transparent; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .clear-btn:hover { border-color: #444; color: #ccc; }

    /* Chat area */
    .chat-area { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 860px; width: 100%; margin: 0 auto; }

    /* Welcome */
    .welcome { text-align: center; padding: 4rem 2rem; }
    .welcome h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .welcome p { font-size: 14px; color: #555; margin-bottom: 2rem; }
    .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 480px; margin: 0 auto; }
    .suggestion { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 12px 14px; cursor: pointer; text-align: left; font-size: 13px; color: #888; font-family: inherit; transition: all 0.2s; }
    .suggestion:hover { border-color: #444; color: #ccc; }
    .suggestion strong { display: block; color: #ccc; font-size: 13px; margin-bottom: 2px; }

    /* Messages */
    .message { margin-bottom: 1.5rem; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { display: flex; justify-content: flex-end; }
    .message.user .bubble { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 14px 14px 4px 14px; padding: 10px 16px; max-width: 70%; font-size: 14px; color: #e8e8e8; }
    .message.assistant { display: flex; gap: 10px; align-items: flex-start; }
    .bot-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1e1e1e; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
    .bot-content { flex: 1; }

    /* Answer card */
    .answer-card { background: #161616; border: 1px solid #1e1e1e; border-radius: 4px 14px 14px 14px; padding: 1.25rem; }
    .answer-text { font-size: 14px; color: #ccc; line-height: 1.75; }
    .answer-text strong { color: #e8e8e8; }

    /* Metrics row */
    .metrics-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .metric-pill { font-size: 11px; padding: 3px 10px; border-radius: 100px; border: 1px solid #222; color: #666; }
    .metric-pill span { color: #888; }

    /* Sources */
    .sources-toggle { font-size: 12px; color: #555; cursor: pointer; margin-top: 10px; display: inline-block; transition: color 0.2s; }
    .sources-toggle:hover { color: #888; }
    .sources-panel { display: none; margin-top: 10px; }
    .sources-panel.open { display: block; }
    .sources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .source-card { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 12px; }
    .source-outlet { font-size: 11px; font-weight: 600; color: #666; }
    .source-title { font-size: 12px; color: #999; margin-top: 3px; line-height: 1.3; }
    .rel-bar { height: 2px; background: #222; border-radius: 2px; margin-top: 8px; }
    .rel-fill { height: 100%; border-radius: 2px; background: #444; }
    .source-link { font-size: 11px; color: #555; text-decoration: none; margin-top: 4px; display: inline-block; }
    .source-link:hover { color: #888; }

    /* Contradiction */
    .contradiction-box { background: #1e1500; border-left: 3px solid #7a5500; border-radius: 6px; padding: 10px 12px; margin-top: 10px; }
    .contradiction-box p { font-size: 12px; color: #a07020; line-height: 1.5; }

    /* Typing indicator */
    .typing { display: flex; gap: 10px; align-items: center; margin-bottom: 1rem; }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: #444; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input area */
    .input-area { border-top: 1px solid #1e1e1e; padding: 1rem 1.5rem; background: #0f0f0f; }
    .input-inner { max-width: 860px; margin: 0 auto; }
    .pills { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .pill { font-size: 11px; padding: 4px 12px; border-radius: 100px; border: 1px solid #1e1e1e; color: #555; cursor: pointer; background: transparent; font-family: inherit; transition: all 0.2s; }
    .pill:hover { border-color: #333; color: #888; }
    .input-row { display: flex; gap: 10px; }
    .msg-input { flex: 1; background: #161616; border: 1px solid #222; border-radius: 10px; padding: 12px 16px; font-size: 14px; color: #e8e8e8; outline: none; font-family: inherit; transition: border-color 0.2s; resize: none; height: 44px; }
    .msg-input:focus { border-color: #333; }
    .msg-input::placeholder { color: #333; }
    .send-btn { background: #fff; color: #0f0f0f; border: none; border-radius: 10px; padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>News Intelligence System</h1>
    <p>Real-time RAG · LangChain · Azure OpenAI · ChromaDB</p>
  </div>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="badges">
      <span class="badge">RAG</span>
      <span class="badge">Memory</span>
      <span class="badge">LangChain</span>
    </div>
    <button class="clear-btn" onclick="clearMemory()">New chat</button>
  </div>
</div>

<!-- Chat area -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <h2>Ask anything about current news</h2>
    <p>I remember context — ask follow-up questions naturally</p>
    <div class="suggestion-grid">
      <button class="suggestion" onclick="sendSuggestion('What is happening with OpenAI?')">
        <strong>OpenAI latest</strong>
        Recent developments & news
      </button>
      <button class="suggestion" onclick="sendSuggestion('What is happening with Nvidia?')">
        <strong>Nvidia updates</strong>
        AI chips & market news
      </button>
      <button class="suggestion" onclick="sendSuggestion('Latest news on Tesla')">
        <strong>Tesla news</strong>
        EV & business updates
      </button>
      <button class="suggestion" onclick="sendSuggestion('Recent developments in AI')">
        <strong>AI trends</strong>
        What's new in AI this week
      </button>
    </div>
  </div>
</div>

<!-- Input area -->
<div class="input-area">
  <div class="input-inner">
    <div class="pills">
      <button class="pill" onclick="setMsg('What is happening with Nvidia?')">Nvidia</button>
      <button class="pill" onclick="setMsg('Latest OpenAI news')">OpenAI</button>
      <button class="pill" onclick="setMsg('Tesla latest news')">Tesla</button>
      <button class="pill" onclick="setMsg('Apple news today')">Apple</button>
      <button class="pill" onclick="setMsg('Stock market today')">Markets</button>
      <button class="pill" onclick="setMsg('Recent AI developments')">AI trends</button>
    </div>
    <div class="input-row">
      <textarea
        class="msg-input"
        id="msgInput"
        placeholder="Ask about any news topic..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let isLoading = false;

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function setMsg(text) { msgInput.value = text; msgInput.focus(); }
function sendSuggestion(text) { msgInput.value = text; sendMessage(); }

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addUserMessage(text) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = `
    <div class="bot-avatar">N</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function parseAnswer(answer) {
  const sections = { summary: '', keypoints: [], contradictions: '', sentiment: '' };
  const lines = answer.split('\n');
  let current = '';
  for (const line of lines) {
    const l = line.trim();
    if (l.startsWith('## Summary')) { current = 'summary'; continue; }
    if (l.startsWith('## Key Points')) { current = 'keypoints'; continue; }
    if (l.startsWith('## Contradictions')) { current = 'contradictions'; continue; }
    if (l.startsWith('## Sentiment')) { current = 'sentiment'; continue; }
    if (current === 'summary' && l) sections.summary += l + ' ';
    if (current === 'keypoints' && l.startsWith('-')) sections.keypoints.push(l.slice(1).trim());
    if (current === 'contradictions' && l) sections.contradictions += l + ' ';
    if (current === 'sentiment' && l) sections.sentiment += l + ' ';
  }
  return sections;
}

function extractSentiment(text) {
  const t = text.toLowerCase();
  if (t.includes('positive')) return '+ Positive';
  if (t.includes('negative')) return '− Negative';
  return '~ Neutral';
}

function addBotMessage(data) {
  hideTyping();
  const parsed = parseAnswer(data.answer);
  const sentiment = extractSentiment(parsed.sentiment + data.answer);
  const avgRel = data.sources.length
    ? (data.sources.reduce((s, a) => s + a.relevance, 0) / data.sources.length).toFixed(2)
    : '0';

  const msgId = 'msg_' + Date.now();

  // Build sources HTML
  let sourcesHtml = '';
  data.sources.forEach(s => {
    const pct = Math.round(s.relevance * 100);
    sourcesHtml += `
      <div class="source-card">
        <div class="source-outlet">${s.source}</div>
        <div class="source-title">${s.title.slice(0, 60)}${s.title.length > 60 ? '...' : ''}</div>
        <div class="rel-bar"><div class="rel-fill" style="width:${pct}%"></div></div>
        <a class="source-link" href="${s.url}" target="_blank">Read →</a>
      </div>`;
  });

  // Build contradiction HTML
  let contHtml = '';
  const cont = data.contradictions || {};
  if (cont.contradictions_found && cont.contradictions.length > 0) {
    cont.contradictions.forEach(c => {
      contHtml += `
        <div class="contradiction-box">
          <p><strong>${c.severity} severity · ${c.topic}</strong></p>
          <p style="margin-top:4px">${c.source_a}: ${c.claim_a}</p>
          <p style="margin-top:4px">${c.source_b}: ${c.claim_b}</p>
        </div>`;
    });
  }

  // Build answer text
  const displayText = parsed.summary || data.answer;

  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `
    <div class="bot-avatar">N</div>
    <div class="bot-content">
      <div class="answer-card">
        <div class="answer-text">${escapeHtml(displayText)}</div>
        <div class="metrics-row">
          <div class="metric-pill">Articles: <span>${data.articles_used}</span></div>
          <div class="metric-pill">Avg relevance: <span>${avgRel}</span></div>
          <div class="metric-pill">Sentiment: <span>${sentiment}</span></div>
        </div>
        ${contHtml}
        <div class="sources-toggle" onclick="toggleSources('${msgId}')">
          Show ${data.sources.length} sources ↓
        </div>
        <div class="sources-panel" id="${msgId}">
          <div class="sources-grid">${sourcesHtml}</div>
        </div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function toggleSources(id) {
  const panel = document.getElementById(id);
  const toggle = panel.previousElementSibling;
  panel.classList.toggle('open');
  toggle.textContent = panel.classList.contains('open')
    ? 'Hide sources ↑'
    : `Show ${panel.querySelectorAll('.source-card').length} sources ↓`;
}

async function sendMessage() {
  const question = msgInput.value.trim();
  if (!question || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  msgInput.value = '';

  addUserMessage(question);
  showTyping();

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, top_k: 5 })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    addBotMessage(data);
  } catch (err) {
    hideTyping();
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `
      <div class="bot-avatar">N</div>
      <div class="bot-content">
        <div class="answer-card">
          <div class="answer-text" style="color:#f44336">Error: ${err.message}</div>
        </div>
      </div>`;
    chatArea.appendChild(div);
  }

  isLoading = false;
  sendBtn.disabled = false;
  scrollBottom();
}

async function clearMemory() {
  await fetch('/clear', { method: 'POST' });
  chatArea.innerHTML = `
    <div class="welcome" id="welcome">
      <h2>Ask anything about current news</h2>
      <p>I remember context — ask follow-up questions naturally</p>
      <div class="suggestion-grid">
        <button class="suggestion" onclick="sendSuggestion('What is happening with OpenAI?')">
          <strong>OpenAI latest</strong>Recent developments & news
        </button>
        <button class="suggestion" onclick="sendSuggestion('What is happening with Nvidia?')">
          <strong>Nvidia updates</strong>AI chips & market news
        </button>
        <button class="suggestion" onclick="sendSuggestion('Latest news on Tesla')">
          <strong>Tesla news</strong>EV & business updates
        </button>
        <button class="suggestion" onclick="sendSuggestion('Recent developments in AI')">
          <strong>AI trends</strong>What's new in AI this week
        </button>
      </div>
    </div>`;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}
</script>
</body>
</html>
